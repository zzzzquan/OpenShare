# OpenShare 配置文件

server:
  port: 8080
  mode: debug  # debug, release, test

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: openshare
  sslmode: disable
  timezone: Asia/Shanghai
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # 秒
  log_mode: false  # 是否打印 SQL 日志

log:
  level: info    # debug, info, warn, error
  format: console  # json, console

storage:
  base_path: /data/openshare

jwt:
  secret: openshare-secret-key-change-in-production
  expire_hour: 24
